<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Node Network Composition</title>
    <style>
      :root {
        color-scheme: dark;
        --paper: #f3efdf;
        --ink: #f3efdf;
        --muted: rgba(243, 239, 223, 0.62);
        --line: rgba(243, 239, 223, 0.12);
        --line-active: rgba(243, 239, 223, 0.72);
        --panel: rgba(18, 18, 18, 0.88);
        --panel-strong: rgba(28, 28, 28, 0.96);
        --edge: rgba(243, 239, 223, 0.16);
        --validator: #c46a3c;
        --peer: #e0d7bb;
        --pulse: rgba(196, 106, 60, 0.18);
        --packet: #f3efdf;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at top left, rgba(243, 239, 223, 0.08), transparent 28%),
          linear-gradient(180deg, rgba(22, 22, 22, 0.98), rgba(10, 10, 10, 0.98));
        color: var(--ink);
        font-family: "Instrument Sans", "Avenir Next", "Segoe UI", sans-serif;
      }

      #stage {
        position: relative;
        width: 1280px;
        height: 720px;
        overflow: hidden;
      }

      .network {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 22% 18%, rgba(243, 239, 223, 0.06), transparent 18%),
          linear-gradient(180deg, rgba(20, 20, 20, 0.82), rgba(8, 8, 8, 0.9));
      }

      .links {
        position: absolute;
        inset: 58px 54px 54px;
      }

      .links line {
        stroke: var(--line);
        stroke-width: 2.5;
        stroke-linecap: round;
      }

      .links line.active {
        stroke: var(--line-active);
        stroke-dasharray: 10 14;
        animation: dash 5.4s linear infinite;
      }

      .node {
        position: absolute;
        width: 148px;
        height: 110px;
        margin-left: -74px;
        margin-top: -55px;
        display: grid;
        place-items: center;
        padding: 18px;
        text-align: left;
        background:
          linear-gradient(180deg, rgba(52, 52, 52, 0.22), transparent 30%),
          linear-gradient(180deg, rgba(24, 24, 24, 0.96), rgba(10, 10, 10, 0.98));
        border: 1px solid var(--edge);
        box-shadow: 0 18px 32px rgba(0, 0, 0, 0.22);
        animation: nodePulse 5.4s linear infinite;
        animation-delay: var(--delay);
      }

      .node strong {
        display: block;
        font-size: 34px;
        letter-spacing: -0.05em;
      }

      .node span {
        display: block;
        margin-top: 7px;
        font-size: 12px;
        color: var(--muted);
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .node::after {
        content: "";
        position: absolute;
        inset: 12px;
        border: 1px solid rgba(243, 239, 223, 0.06);
        pointer-events: none;
      }

      .node-peer strong {
        color: var(--peer);
      }

      .node-validator strong {
        color: #f1b08d;
      }

      .node-validator {
        background:
          radial-gradient(circle at 18% 20%, rgba(196, 106, 60, 0.18), transparent 42%),
          linear-gradient(180deg, rgba(40, 24, 18, 0.94), rgba(12, 10, 10, 0.98));
      }

      .packet {
        position: absolute;
        width: 16px;
        height: 16px;
        background: var(--packet);
        box-shadow: 0 0 0 10px var(--pulse);
        animation: travel 5.4s linear infinite;
      }

      .packet.packet-a {
        animation-delay: 0s;
      }

      .packet.packet-b {
        animation-delay: 1.8s;
      }

      .packet.packet-c {
        animation-delay: 3.6s;
      }

      @keyframes dash {
        to {
          stroke-dashoffset: -56;
        }
      }

      @keyframes nodePulse {
        0%,
        12%,
        100% {
          transform: scale(1);
          border-color: var(--edge);
        }

        8% {
          transform: scale(1.04);
          border-color: rgba(243, 239, 223, 0.28);
        }
      }

      @keyframes travel {
        0% {
          transform: translate(84px, 352px);
          opacity: 0;
        }

        8% {
          opacity: 1;
        }

        34% {
          transform: translate(318px, 162px);
          opacity: 1;
        }

        58% {
          transform: translate(560px, 218px);
          opacity: 1;
        }

        82% {
          transform: translate(804px, 332px);
          opacity: 1;
        }

        100% {
          transform: translate(946px, 332px);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="stage" data-composition-id="node-network" data-start="0" data-duration="12" data-width="1280" data-height="720">
      <div class="network">
        <svg class="links" viewBox="0 0 1040 560" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <line x1="130" y1="354" x2="302" y2="162" />
          <line x1="130" y1="354" x2="292" y2="468" />
          <line x1="302" y1="162" x2="548" y2="218" class="active" />
          <line x1="292" y1="468" x2="548" y2="218" />
          <line x1="548" y1="218" x2="792" y2="332" class="active" />
          <line x1="292" y1="468" x2="792" y2="332" />
          <line x1="792" y1="332" x2="936" y2="332" class="active" />
        </svg>

        <div class="node node-peer" style="left: 130px; top: 354px; --delay: 0s;">
          <div>
            <strong>N1</strong>
            <span>Ingress node</span>
          </div>
        </div>

        <div class="node node-peer" style="left: 302px; top: 162px; --delay: 0.8s;">
          <div>
            <strong>N2</strong>
            <span>Peer relay</span>
          </div>
        </div>

        <div class="node node-peer" style="left: 292px; top: 468px; --delay: 1.5s;">
          <div>
            <strong>N3</strong>
            <span>Peer relay</span>
          </div>
        </div>

        <div class="node node-validator" style="left: 548px; top: 218px; --delay: 2.2s;">
          <div>
            <strong>V1</strong>
            <span>Validator</span>
          </div>
        </div>

        <div class="node node-validator" style="left: 792px; top: 332px; --delay: 3s;">
          <div>
            <strong>V2</strong>
            <span>Validator</span>
          </div>
        </div>

        <div class="node node-peer" style="left: 936px; top: 332px; --delay: 3.6s;">
          <div>
            <strong>N4</strong>
            <span>Updated peer</span>
          </div>
        </div>

        <div class="packet packet-a"></div>
        <div class="packet packet-b"></div>
        <div class="packet packet-c"></div>
      </div>
    </div>
  </body>
</html>
